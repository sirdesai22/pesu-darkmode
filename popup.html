<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PESU Dark Mode</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #080b14;
      --surface: rgba(255, 255, 255, 0.05);
      --border: rgba(255, 255, 255, 0.08);
      --orange: #f97316;
      --orange-glow: rgba(249, 115, 22, 0.28);
      --text: #e2e8f0;
      --muted: #64748b;
      --radius: 14px;
    }

    body {
      width: 320px;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 15% 15%, rgba(249, 115, 22, 0.09) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 85%, rgba(99, 102, 241, 0.07) 0%, transparent 55%);
      font-family: 'Outfit', sans-serif;
      color: var(--text);
      padding: 16px;
      overflow: hidden;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #f97316, #fb923c);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      box-shadow: 0 0 18px var(--orange-glow);
    }

    .logo-text {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .logo-text span { color: var(--orange); }

    .version {
      font-size: 10px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 3px 9px;
      border-radius: 20px;
    }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 15px;
      margin-bottom: 10px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s;
      animation: fadeUp 0.4s ease both;
    }

    .card:nth-child(2) { animation-delay: 0.05s; }
    .card:nth-child(3) { animation-delay: 0.1s; }
    .card:nth-child(4) { animation-delay: 0.15s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Toggle Card */
    .toggle-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .toggle-card::after {
      content: '';
      position: absolute;
      left: 0; bottom: 0;
      height: 2px;
      width: 0%;
      background: linear-gradient(90deg, var(--orange), transparent);
      transition: width 0.5s ease;
      border-radius: 0 0 var(--radius) var(--radius);
    }

    .toggle-card.active::after { width: 100%; }

    .toggle-info { flex: 1; }

    .toggle-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .toggle-sub {
      font-size: 11px;
      color: var(--muted);
    }

    .toggle-status {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--muted);
      margin-top: 6px;
      transition: color 0.3s;
    }

    .toggle-status.active { color: var(--orange); }

    /* Switch */
    .switch {
      position: relative;
      width: 48px;
      height: 26px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .switch input { display: none; }

    .switch-track {
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 26px;
      border: 1px solid var(--border);
      transition: background 0.3s, box-shadow 0.3s;
    }

    .switch-thumb {
      position: absolute;
      top: 3px; left: 3px;
      width: 18px; height: 18px;
      background: white;
      border-radius: 50%;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
    }

    input:checked ~ .switch-track {
      background: var(--orange);
      border-color: var(--orange);
      box-shadow: 0 0 16px var(--orange-glow);
    }

    input:checked ~ .switch-thumb { transform: translateX(22px); }

    /* Quote Card */
    .quote-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .quote-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .quote-num {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--muted);
    }

    .quote-mark {
      font-size: 36px;
      line-height: 1;
      color: var(--orange);
      font-family: Georgia, serif;
      opacity: 0.55;
      margin-bottom: -4px;
    }

    .quote-text {
      font-size: 12.5px;
      line-height: 1.65;
      color: #cbd5e1;
      font-style: italic;
      min-height: 52px;
      transition: opacity 0.25s;
    }

    .quote-author {
      font-size: 11px;
      color: var(--orange);
      font-weight: 600;
      margin-top: 9px;
      letter-spacing: 0.02em;
    }

    .quote-footer {
      display: flex;
      justify-content: flex-end;
      margin-top: 11px;
    }

    .next-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 5px 11px;
      font-size: 11px;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }

    .next-btn:hover {
      border-color: var(--orange);
      color: var(--orange);
      background: rgba(249, 115, 22, 0.06);
    }

    /* Dev Card */
    .dev-card { padding: 12px 15px; }

    .dev-header {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      text-align: center;
    }

    .dev-avatars {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    .dev-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      text-decoration: none;
    }

    .dev-img {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 2px solid var(--border);
      object-fit: cover;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    }

    .dev-link:hover .dev-img {
      border-color: var(--orange);
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(249, 115, 22, 0.25);
    }

    .dev-name {
      font-size: 9px;
      color: var(--muted);
      text-align: center;
      transition: color 0.2s;
      max-width: 58px;
      line-height: 1.3;
    }

    .dev-link:hover .dev-name { color: var(--orange); }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">
      <div class="logo-icon">🌙</div>
      <div class="logo-text">PESU <span>Dark</span></div>
    </div>
    <div class="version">v1.1</div>
  </div>

  <!-- Toggle -->
  <div class="card toggle-card" id="toggle-card">
    <div class="toggle-info">
      <div class="toggle-title">Dark Mode</div>
      <div class="toggle-sub">Apply dark theme to PESU portal</div>
      <div class="toggle-status" id="toggle-status">● INACTIVE</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="dark-toggle">
      <div class="switch-track"></div>
      <div class="switch-thumb"></div>
    </label>
  </div>

  <!-- Quote -->
  <div class="card">
    <div class="quote-header">
      <span class="quote-label">Daily Fuel</span>
      <span class="quote-num" id="quote-num">01 / 10</span>
    </div>
    <div class="quote-mark">"</div>
    <div class="quote-text" id="quote-text"></div>
    <div class="quote-author" id="quote-author"></div>
    <div class="quote-footer">
      <button class="next-btn" id="next-quote">Next →</button>
    </div>
  </div>

  <!-- Devs -->
  <div class="card dev-card">
    <div class="dev-header">crafted by</div>
    <div class="dev-avatars">
      <a class="dev-link" href="https://www.linkedin.com/in/sirdesai-exe/" target="_blank">
        <img class="dev-img" src="ps1.jpg" alt="Prathamesh">
        <span class="dev-name">Prathamesh</span>
      </a>
      <a class="dev-link" href="https://www.linkedin.com/in/priyankarhaldar/" target="_blank">
        <img class="dev-img" src="ph.jpg" alt="Priyankar">
        <span class="dev-name">Priyankar</span>
      </a>
      <a class="dev-link" href="https://www.linkedin.com/in/rohan-gavada-00b541286/" target="_blank">
        <img class="dev-img" src="rg.jpg" alt="Rohan">
        <span class="dev-name">Rohan</span>
      </a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
